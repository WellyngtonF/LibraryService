<div class="container my-3">
    <h2 class="my-3">Books List</h2>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <table class="table table-hover">
            <thead class="table-dark">
                <tr>
                    <th>Title</th>
                    <th>Author</th>
                    <th>Publisher</th>
                </tr>
            </thead>
            <tbody>
                {% for book in books %}
                <tr hx-get="http://localhost:8000/books/{{ book.id }}" hx-target="#content" hx-trigger="dblclick">
                    <td>{{ book.title }}</td>
                    <td>{{ book.author }}</td>
                    <td>{{ book.publisher }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    <button class="btn btn-primary" hx-get="http://localhost:8000/books/new" hx-target="#content">
        <i class="bi bi-plus"></i> Add New Book
    </button>
</div>
